<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Login - Heritage Procurement</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #1a7a3c;
            --brand-hover: #145c2d;
            --bg: #f4f6f8;
            --surface: #ffffff;
            --border: #dfe3e8;
            --ink: #212b36;
            --muted: #637381;
            --red: #d32f2f;
            --font-main: 'Roboto', sans-serif;
            --shadow-card: 0 12px 24px -4px rgba(145, 158, 171, 0.12), 0 0 2px 0 rgba(145, 158, 171, 0.2);
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            color: var(--ink);
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* The Smart Card */
        .login-card {
            background: var(--surface);
            width: 100%;
            max-width: 440px;
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-container {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            background: rgba(26, 122, 60, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--brand);
        }

        .title {
            font-size: 24px;
            font-weight: 700;
            color: var(--ink);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        /* Inputs */
        .form-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            pointer-events: none;
            display: flex;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            height: 52px;
            padding: 0 16px 0 48px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 15px;
            color: var(--ink);
            background: var(--surface);
            transition: all 0.2s;
            outline: none;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 4px rgba(26, 122, 60, 0.1);
        }

        /* Smart Actions: Remember Me & Forgot Password */
        .smart-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--ink);
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            accent-color: var(--brand);
            cursor: pointer;
        }

        .forgot-link {
            color: var(--brand);
            text-decoration: none;
            font-weight: 500;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* Button */
        .btn {
            width: 100%;
            height: 48px;
            background: var(--brand);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: var(--font-main);
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(26, 122, 60, 0.2);
        }

        .btn:hover {
            background: var(--brand-hover);
            box-shadow: 0 6px 16px rgba(26, 122, 60, 0.3);
        }

        .btn:disabled {
            background: var(--border);
            color: var(--muted);
            box-shadow: none;
            cursor: not-allowed;
        }

        /* Error Message */
        #errorMsg {
            color: var(--red);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            padding: 12px;
            background: #ffebee;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <div class="logo-container">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>
            <h1 class="title">Welcome Back</h1>
            <p class="subtitle">Please enter your details to sign in.</p>
        </div>

        <div id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <input type="text" id="username" placeholder="Username or Plant Code" required autocomplete="username">
            </div>

            <div class="form-group">
                <div class="input-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            </div>

            <div class="smart-actions">
                <label class="checkbox-group">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember me</span>
                </label>
                <!-- <a href="#" class="forgot-link">Forgot Password?</a> -->
            </div>

            <button type="submit" class="btn" id="submitBtn">Sign In</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            // Note: rememberMe is currently UI-only. Add backend logic in app.py if needed.
            // const rememberMe = document.getElementById('rememberMe').checked; 
            
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            // Reset UI
            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Signing in...';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    btn.textContent = 'Success!';
                    window.location.href = data.redirect || '/';
                } else {
                    errorMsg.textContent = data.error || 'Invalid credentials. Please try again.';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Sign In';
                    document.getElementById('password').value = ''; 
                    document.getElementById('password').focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please check your connection.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
