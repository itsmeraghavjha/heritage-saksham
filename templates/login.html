<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Heritage Procurement Intelligence — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: #1a4731;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 20px;
  }
  .logo-text h1 { font-size: 18px; color: #1a4731; font-weight: 700; }
  .logo-text p  { font-size: 12px; color: #666; margin-top: 2px; }
  label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 14px;
    border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 14px; color: #111;
    transition: border-color .15s;
    margin-bottom: 18px;
  }
  input:focus { outline: none; border-color: #1a4731; }
  .btn {
    width: 100%; padding: 12px;
    background: #1a4731; color: #fff;
    border: none; border-radius: 8px;
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .btn:hover   { background: #14532d; }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }
  .error {
    background: #fef2f2; border: 1px solid #fca5a5;
    color: #b91c1c; border-radius: 8px;
    padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">H</div>
    <div class="logo-text">
      <h1>Heritage Foods</h1>
      <p>Procurement Intelligence Portal</p>
    </div>
  </div>

  <div class="error" id="err"></div>

  <label for="username">Username</label>
  <input id="username" type="text" placeholder="Enter username" autocomplete="username">

  <label for="password">Password</label>
  <input id="password" type="password" placeholder="Enter password" autocomplete="current-password">

  <button class="btn" id="btn" onclick="login()">Sign In</button>
</div>

<script>
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") login();
  });

  async function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const err      = document.getElementById("err");
    const btn      = document.getElementById("btn");

    err.style.display = "none";
    if (!username || !password) {
      err.textContent = "Please enter username and password.";
      err.style.display = "block";
      return;
    }

    btn.disabled    = true;
    btn.textContent = "Signing in...";

    try {
      const res  = await fetch("/api/auth/login", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ username, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        err.textContent   = data.error || "Login failed.";
        err.style.display = "block";
        btn.disabled = false; btn.textContent = "Sign In";
      } else {
        window.location.href = data.redirect;
      }
    } catch (e) {
      err.textContent   = "Connection error. Is the server running?";
      err.style.display = "block";
      btn.disabled = false; btn.textContent = "Sign In";
    }
  }
</script>
</body>
</html>
